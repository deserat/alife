<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALife Sim 02 — Dynamic Landscape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;padding:1rem}
h1{font-size:1.1rem;color:#f0f6fc;margin-bottom:.5rem}
canvas{border:1px solid #30363d;border-radius:4px;display:block;margin-bottom:.5rem}
.legend{display:flex;gap:1rem;font-size:.8rem;margin-bottom:.5rem}
.legend span{display:inline-flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.controls{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
button{background:#238636;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:.85rem}
button:hover{background:#2ea043}
button.sec{background:#21262d;color:#c9d1d9}
input[type=range]{accent-color:#58a6ff}
.stats{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:.5rem;font-size:.8rem;font-family:monospace;display:grid;grid-template-columns:1fr 1fr;gap:2px 1rem;margin-bottom:.5rem}
.stats .val{color:#58a6ff}
.finding{font-size:.75rem;color:#8b949e;font-style:italic}
</style>
</head>
<body>
<h1>Sim 02 — Dynamic Fitness Landscape</h1>
<div class="legend">
<span><span class="dot" style="background:#2ea043"></span> Static</span>
<span><span class="dot" style="background:#58a6ff"></span> Dynamic</span>
</div>
<canvas id="diversity" width="900" height="250"></canvas>
<canvas id="fitness" width="900" height="250"></canvas>
<canvas id="mods" width="900" height="150"></canvas>
<div class="controls">
<button id="play">Pause</button>
<button id="reset" class="sec">Reset</button>
<label>Speed: <input type="range" id="speed" min="1" max="500" value="50"></label>
</div>
<div class="stats" id="stats"></div>
<p class="finding">Key finding: Both conditions converge. Dynamic converges harder — diversity drops to 1, fitness explodes to ~2500.</p>
<script>
const dc=document.getElementById('diversity'),dx=dc.getContext('2d');
const fc=document.getElementById('fitness'),fx=fc.getContext('2d');
const mc=document.getElementById('mods'),mx=mc.getContext('2d');
const W=dc.width;
let data,running=true,gen=0,speed=50;
async function init(){
  const r=await fetch('results.json');data=await r.json();
  gen=0;animate();
}
function drawLine(ctx,h,w,key,color,label){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,w,ctx.canvas.height);
  ctx.strokeStyle='#30363d';ctx.beginPath();
  for(let i=0;i<=4;i++){const y=i*ctx.canvas.height/4;ctx.moveTo(0,y);ctx.lineTo(w,y);}ctx.stroke();
  const vals=h.map(e=>e[key]||0);const max=Math.max(...vals,0.001);
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
  const step=w/Math.max(h.length-1,1);
  for(let i=0;i<=gen&&i<h.length;i++){
    const x=i*step,y=ctx.canvas.height-(h[i][key]||0)/max*ctx.canvas.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }ctx.stroke();
  ctx.fillStyle='#8b949e';ctx.font='11px monospace';ctx.fillText(label+': '+(h[Math.min(gen,h.length-1)][key]||0).toFixed(2),8,14);
}
function animate(){
  if(!running)return;
  gen=Math.min(gen+speed,data.static.history.length-1);
  drawLine(dx,data.static.history,W,'diversity','#2ea043','Diversity (static)');
  drawLine(dx,data.dynamic.history,W,'diversity','#58a6ff','Diversity (dynamic)');
  drawLine(fx,data.static.history,W,'mean_fitness','#2ea043','Mean fitness (static)');
  drawLine(fx,data.dynamic.history,W,'mean_fitness','#58a6ff','Mean fitness (dynamic)');
  drawLine(mx,data.dynamic.history,W,'landscape_modification','#ff4500','Landscape modifications');
  const s=data.static.history[Math.min(gen,data.static.history.length-1)];
  const d=data.dynamic.history[Math.min(gen,data.dynamic.history.length-1)];
  document.getElementById('stats').innerHTML=`
    <div>Gen: <span class="val">${gen}</span></div>
    <div>Static diversity: <span class="val">${s.diversity}</span></div>
    <div>Dynamic diversity: <span class="val">${d.diversity}</span></div>
    <div>Static fitness: <span class="val">${s.mean_fitness.toFixed(2)}</span></div>
    <div>Dynamic fitness: <span class="val">${d.mean_fitness.toFixed(2)}</span></div>
    <div>Modifications: <span class="val">${d.landscape_modification.toFixed(0)}</span></div>
  `;
  if(gen<data.static.history.length-1)requestAnimationFrame(animate);
}
document.getElementById('play').onclick=function(){running=!running;this.textContent=running?'Pause':'Play';if(running)animate();};
document.getElementById('reset').onclick=function(){gen=0;running=true;document.getElementById('play').textContent='Pause';animate();};
document.getElementById('speed').oninput=function(){speed=+this.value;};
init();
</script>
</body>
</html>
