<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALife Sim 04 — Evolving Networks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;padding:1rem}
h1{font-size:1.1rem;color:#f0f6fc;margin-bottom:.5rem}
canvas{border:1px solid #30363d;border-radius:4px;display:block;margin-bottom:.5rem}
.controls{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
button{background:#238636;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:.85rem}
button:hover{background:#2ea043}
button.sec{background:#21262d;color:#c9d1d9}
button.toggle{background:#1f6feb}
input[type=range]{accent-color:#58a6ff}
.stats{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:.5rem;font-size:.8rem;font-family:monospace;display:grid;grid-template-columns:1fr 1fr;gap:2px 1rem;margin-bottom:.5rem}
.stats .val{color:#58a6ff}
.finding{font-size:.75rem;color:#8b949e;font-style:italic}
</style>
</head>
<body>
<h1>Sim 04 — Evolving Reaction Networks</h1>
<div class="legend" style="display:flex;gap:1rem;font-size:.8rem;margin-bottom:.5rem">
<span><span class="dot" style="width:10px;height:10px;border-radius:50%;display:inline-block;background:#2ea043"></span> Fixed</span>
<span><span class="dot" style="width:10px;height:10px;border-radius:50%;display:inline-block;background:#58a6ff"></span> Evolving</span>
</div>
<div class="controls">
<button id="play">Pause</button>
<button id="reset" class="sec">Reset</button>
<label>Speed: <input type="range" id="speed" min="1" max="20" value="1"></label>
</div>
<canvas id="species" width="900" height="250"></canvas>
<canvas id="mass" width="900" height="250"></canvas>
<canvas id="comps" width="900" height="150"></canvas>
<div class="stats" id="stats"></div>
<p class="finding">Key finding: Both conditions saturate at 510 species (finite species space). The 'one bit' problem from Vasas is confirmed.</p>
<script>
const sc=document.getElementById('species'),sx=sc.getContext('2d');
const mc=document.getElementById('mass'),mx=mc.getContext('2d');
const cc=document.getElementById('comps'),cx=cc.getContext('2d');
const W=sc.width;
let data,running=true,gen=0,speed=1;
async function init(){const r=await fetch('results.json');data=await r.json();gen=0;animate();}
function drawDual(ctx,h1,h2,w,key,color1,color2,label){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,w,ctx.canvas.height);
  ctx.strokeStyle='#30363d';ctx.beginPath();
  for(let i=0;i<=4;i++){const y=i*ctx.canvas.height/4;ctx.moveTo(0,y);ctx.lineTo(w,y);}ctx.stroke();
  const all=[...h1.slice(0,gen+1).map(e=>e[key]||0),...h2.slice(0,gen+1).map(e=>e[key]||0)];
  const max=Math.max(...all,0.001);
  const step=w/Math.max(h1.length-1,1);
  ctx.strokeStyle=color1;ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=gen&&i<h1.length;i++){const x=i*step,y=ctx.canvas.height-(h1[i][key]||0)/max*ctx.canvas.height;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  ctx.strokeStyle=color2;ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=gen&&i<h2.length;i++){const x=i*step,y=ctx.canvas.height-(h2[i][key]||0)/max*ctx.canvas.height;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  ctx.fillStyle='#8b949e';ctx.font='11px monospace';
  const e1=h1[Math.min(gen,h1.length-1)],e2=h2[Math.min(gen,h2.length-1)];
  ctx.fillText(label+` — Fixed: ${(e1[key]||0).toFixed(0)} | Evolving: ${(e2[key]||0).toFixed(0)}`,8,14);
}
function animate(){
  if(!running)return;
  gen=Math.min(gen+speed,data.fixed_network.history.length-1);
  drawDual(sx,data.fixed_network.history,data.evolving_network.history,W,'n_species','#2ea043','#58a6ff','Species count');
  drawDual(mc,data.fixed_network.history,data.evolving_network.history,W,'total_mass','#2ea043','#58a6ff','Total mass');
  drawDual(cc,data.fixed_network.history,data.evolving_network.history,W,'n_compartments','#2ea043','#58a6ff','Compartments');
  const f=data.fixed_network.history[Math.min(gen,data.fixed_network.history.length-1)];
  const e=data.evolving_network.history[Math.min(gen,data.evolving_network.history.length-1)];
  document.getElementById('stats').innerHTML=`
    <div>Time: <span class="val">${f.time}</span></div>
    <div>Fixed species: <span class="val">${f.n_species}</span></div>
    <div>Evolving species: <span class="val">${e.n_species}</span></div>
    <div>Fixed mass: <span class="val">${f.total_mass.toFixed(0)}</span></div>
    <div>Evolving mass: <span class="val">${e.total_mass.toFixed(0)}</span></div>
    <div>Fixed comps: <span class="val">${f.n_compartments}</span></div>
    <div>Evolving comps: <span class="val">${e.n_compartments}</span></div>
    <div>Cores sampled: <span class="val">${f.n_cores_sampled}</span></div>
  `;
  if(gen<data.fixed_network.history.length-1)requestAnimationFrame(animate);
}
document.getElementById('play').onclick=function(){running=!running;this.textContent=running?'Pause':'Play';if(running)animate();};
document.getElementById('reset').onclick=function(){gen=0;running=true;document.getElementById('play').textContent='Pause';animate();};
document.getElementById('speed').oninput=function(){speed=+this.value;};
init();
</script>
</body>
</html>
