<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALife Sim 04 — Evolving Networks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; }
        #app { display: flex; gap: 1rem; padding: 1rem; flex-wrap: wrap; }
        .chart-container { display: flex; flex-direction: column; }
        canvas { border: 1px solid #30363d; border-radius: 4px; image-rendering: pixelated; }
        #controls { width: 280px; display: flex; flex-direction: column; gap: 1rem; }
        h1 { font-size: 1.1rem; color: #f0f6fc; }
        label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.85rem; color: #8b949e; }
        input[type=range] { width: 100%; accent-color: #58a6ff; }
        input[type=number] { width: 60px; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 2px 6px; font-size: 0.85rem; }
        button { background: #238636; color: #fff; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; }
        button:hover { background: #2ea043; }
        button.secondary { background: #21262d; color: #c9d1d9; }
        button.secondary:hover { background: #30363d; }
        .stats { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.75rem; font-size: 0.8rem; font-family: monospace; }
        .stats div { display: flex; justify-content: space-between; margin: 2px 0; }
        .stats .val { color: #58a6ff; }
        .legend { font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
        .legend span { display: inline-flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div id="app">
        <div class="chart-container">
            <canvas id="chart" width="800" height="400"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="compartments-chart" width="800" height="200"></canvas>
        </div>
        <div id="controls">
            <h1>🌐 Evolving Networks</h1>
            <div class="legend">
                <span><span class="dot" style="background:#2ea043"></span> Fixed condition</span>
                <span><span class="dot" style="background:#58a6ff"></span> Evolving condition</span>
                <span><span class="dot" style="background:#00ffff"></span> Compartment growth</span>
                <span><span class="dot" style="background:#ff4500"></span> Novel species</span>
            </div>
            <label>Simulation speed: <span id="speed-val">50</span> steps/frame
                <input type="range" id="speed" min="1" max="200" step="1" value="50">
            </label>
            <label>Network condition: 
                <select id="condition">
                    <option value="fixed">Fixed</option>
                    <option value="evolving">Evolving</option>
                </select>
            </label>
            <label>Reset position: <input type="number" id="reset-pos" value="0" min="0">
            </label>
            <div style="display:flex;gap:6px">
                <button id="play">⏸ Pause</button>
                <button id="reset" class="secondary">↺ Reset</button>
            </div>
            <div class="stats">
                <div>Generation: <span class="val" id="stat-gen">0</span></div>
                <div>Fixed species: <span class="val" id="stat-fixed">0</span></div>
                <div>Evolving species: <span class="val" id="stat-evolving">0</span></div>
                <div>Compartments: <span class="val" id="stat-compartments">0</span></div>
                <div>Novel species: <span class="val" id="stat-novel">0</span></div>
            </div>
            <p style="font-size:0.75rem;color:#8b949e">Key finding: Both fixed and evolving network conditions saturate at 510 species, indicating a finite species space capacity.</p>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const compartmentsCanvas = document.getElementById('compartments-chart');
        const compartmentsCtx = compartmentsCanvas.getContext('2d');
        
        const CANVAS_WIDTH = canvas.width;
        const CANVAS_HEIGHT = canvas.height;
        const FIXED_COLOR = '#2ea043';
        const EVOLVING_COLOR = '#58a6ff';
        const COMPARTMENT_COLOR = '#00ffff';
        const NOVEL_COLOR = '#ff4500';
        
        let data, maxGenerations, running = false;
        let currentGen = 0;
        let playSpeed = 50;
        let currentCondition = 'evolving';
        let maxSpecies = 0;
        
        async function loadData() {
            const response = await fetch('results.json');
            data = await response.json();
            maxGenerations = data.generations.length - 1;
            maxSpecies = data.finiteSpecies;
        }
        
        function drawCharts() {
            const generationData = data.generations[currentGen];
            
            // Clear and draw background
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw species count
            const fixedY = CANVAS_HEIGHT - (generationData.fixed / maxSpecies) * CANVAS_HEIGHT;
            const evolvingY = CANVAS_HEIGHT - (generationData.evolving / maxSpecies) * CANVAS_HEIGHT;
            
            // Draw fixed condition
            ctx.fillStyle = FIXED_COLOR;
            ctx.fillRect(currentGen * 4, fixedY, 3, CANVAS_HEIGHT - fixedY);
            
            // Draw evolving condition
            ctx.fillStyle = EVOLVING_COLOR;
            ctx.fillRect(currentGen * 4 + 1, evolvingY, 3, CANVAS_HEIGHT - evolvingY);
            
            // Draw compartments
            generationData.compartments.forEach(compartment => {
                ctx.fillStyle = COMPARTMENT_COLOR;
                const x = compartment.x * 2;
                const y = CANVAS_HEIGHT - compartment.y * 2;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw novel species
            generationData.novelSpecies.forEach(species => {
                ctx.fillStyle = NOVEL_COLOR;
                const x = species.x * 2;
                const y = CANVAS_HEIGHT - species.y * 2;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            drawCompartmentsChart(generationData.compartments.length);
            
            // Update stats
            document.getElementById('stat-gen').textContent = currentGen;
            document.getElementById('stat-fixed').textContent = generationData.fixed;
            document.getElementById('stat-evolving').textContent = generationData.evolving;
            document.getElementById('stat-compartments').textContent = generationData.compartments.length;
            document.getElementById('stat-novel').textContent = generationData.novelSpecies.length;
        }
        
        function drawCompartmentsChart(compartmentCount) {
            compartmentsCtx.fillStyle = '#0d1117';
            compartmentsCtx.fillRect(0, 0, compartmentsCanvas.width, compartmentsCanvas.height);
            
            const points = data.generations.map(gen => gen.compartments.length);
            const maxCompartments = Math.max(...points);
            
            compartmentsCtx.beginPath();
            compartmentsCtx.strokeStyle = COMPARTMENT_COLOR;
            compartmentsCtx.lineWidth = 2;
            
            for (let i = 0; i <= currentGen; i++) {
                const x = (i / maxGenerations) * compartmentsCanvas.width;
                const y = compartmentsCanvas.height - (points[i] / maxCompartments) * compartmentsCanvas.height;
                if (i === 0) {
                    compartmentsCtx.moveTo(x, y);
                } else {
                    compartmentsCtx.lineTo(x, y);
                }
            }
            compartmentsCtx.stroke();
        }
        
        function mainLoop() {
            if (running) {
                if (currentGen < maxGenerations) {
                    currentGen++;
                } else {
                    running = false;
                    document.getElementById('play').textContent = '▶ Play';
                }
            }
            drawCharts();
            requestAnimationFrame(mainLoop);
        }
        
        // Controls
        document.getElementById('speed').oninput = function(e) {
            playSpeed = parseInt(e.target.value);
            document.getElementById('speed-val').textContent = playSpeed;
        };
        
        document.getElementById('condition').onchange = function(e) {
            currentCondition = e.target.value;
            drawCharts();
        };
        
        document.getElementById('play').onclick = function() {
            running = !running;
            this.textContent = running ? '⏸ Pause' : '▶ Play';
        };
        
        document.getElementById('reset').onclick = function() {
            running = false;
            currentGen = parseInt(document.getElementById('reset-pos').value);
            document.getElementById('play').textContent = '▶ Play';
            drawCharts();
        };
        
        loadData().then(() => {
            mainLoop();
        });
    </script>
</body>
</html>
