<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALife Sim 03 — Chemical Organizations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;padding:1rem}
h1{font-size:1.1rem;color:#f0f6fc;margin-bottom:.5rem}
canvas{border:1px solid #30363d;border-radius:4px;display:block;margin-bottom:.5rem}
.controls{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
button{background:#238636;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:.85rem}
button:hover{background:#2ea043}
button.sec{background:#21262d;color:#c9d1d9}
button.toggle{background:#1f6feb}
input[type=range]{accent-color:#58a6ff}
.stats{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:.5rem;font-size:.8rem;font-family:monospace;display:grid;grid-template-columns:1fr 1fr;gap:2px 1rem;margin-bottom:.5rem}
.stats .val{color:#58a6ff}
.finding{font-size:.75rem;color:#8b949e;font-style:italic}
</style>
</head>
<body>
<h1>Sim 03 — Chemical Organizations (Trace Competition)</h1>
<div class="controls">
<button id="play">Pause</button>
<button id="reset" class="sec">Reset</button>
<button id="toggle" class="toggle">Multi-trace</button>
<label>Speed: <input type="range" id="speed" min="1" max="200" value="30"></label>
</div>
<canvas id="conc" width="900" height="300"></canvas>
<canvas id="orgs" width="900" height="200"></canvas>
<div class="stats" id="stats"></div>
<p class="finding">Key finding: Trace competition doesn't prevent convergence. Multiple trace types produce no nested organizations.</p>
<script>
const cc=document.getElementById('conc'),cx=cc.getContext('2d');
const oc=document.getElementById('orgs'),ox=oc.getContext('2d');
const W=cc.width;
const COLORS=['#58a6ff','#2ea043','#ff4500','#f0c674','#bd93f9','#50fa7b','#ffb86c','#ff79c6'];
let data,running=true,gen=0,speed=30,useMulti=false;
async function init(){
  const r=await fetch('results.json');data=await r.json();gen=0;animate();
}
function getHistory(){return useMulti?data.multi_trace.history:data.single_trace.history;}
function drawConc(){
  cx.fillStyle='#0d1117';cx.fillRect(0,0,W,cc.height);
  const h=getHistory();
  // Find max concentration count
  const nConc=h[0].concentrations?h[0].concentrations.length:1;
  const maxAll=Math.max(...h.slice(0,gen+1).flatMap(e=>e.concentrations||[0]),0.001);
  cx.strokeStyle='#30363d';cx.beginPath();
  for(let i=0;i<=4;i++){const y=i*cc.height/4;cx.moveTo(0,y);cx.lineTo(W,y);}cx.stroke();
  const step=W/Math.max(h.length-1,1);
  for(let c=0;c<nConc;c++){
    cx.strokeStyle=COLORS[c%COLORS.length];cx.lineWidth=2;cx.beginPath();
    for(let i=0;i<=gen&&i<h.length;i++){
      const v=h[i].concentrations?h[i].concentrations[c]||0:0;
      const x=i*step,y=cc.height-v/maxAll*cc.height;
      i===0?cx.moveTo(x,y):cx.lineTo(x,y);
    }cx.stroke();
  }
  cx.fillStyle='#8b949e';cx.font='11px monospace';cx.fillText('Concentrations over time',8,14);
}
function drawOrgs(){
  ox.fillStyle='#0d1117';ox.fillRect(0,0,W,oc.height);
  const h=getHistory();
  const maxOrgs=Math.max(...h.slice(0,gen+1).map(e=>e.n_organizations||0),1);
  ox.strokeStyle='#30363d';ox.beginPath();
  for(let i=0;i<=4;i++){const y=i*oc.height/4;ox.moveTo(0,y);ox.lineTo(W,y);}ox.stroke();
  const step=W/Math.max(h.length-1,1);
  ox.strokeStyle='#58a6ff';ox.lineWidth=2;ox.beginPath();
  for(let i=0;i<=gen&&i<h.length;i++){
    const x=i*step,y=oc.height-(h[i].n_organizations||0)/maxOrgs*oc.height;
    i===0?ox.moveTo(x,y):ox.lineTo(x,y);
  }ox.stroke();
  ox.strokeStyle='#ff4500';ox.lineWidth=2;ox.beginPath();
  for(let i=0;i<=gen&&i<h.length;i++){
    const x=i*step,y=oc.height-(h[i].n_active_organizations||0)/maxOrgs*oc.height;
    i===0?ox.moveTo(x,y):ox.lineTo(x,y);
  }ox.stroke();
  ox.fillStyle='#8b949e';ox.font='11px monospace';ox.fillText('Organizations (blue) / Active (red)',8,14);
}
function animate(){
  if(!running)return;
  gen=Math.min(gen+speed,getHistory().length-1);
  drawConc();drawOrgs();
  const h=getHistory();const e=h[Math.min(gen,h.length-1)];
  document.getElementById('stats').innerHTML=`
    <div>Gen: <span class="val">${e.generation}</span></div>
    <div>Active resources: <span class="val">${e.n_active_resources}</span></div>
    <div>Organizations: <span class="val">${e.n_organizations}</span></div>
    <div>Active orgs: <span class="val">${e.n_active_organizations}</span></div>
    <div>Max org size: <span class="val">${e.max_org_size}</span></div>
    <div>Nested orgs: <span class="val">${e.n_nested_organizations}</span></div>
    <div>Condition: <span class="val">${useMulti?'multi':'single'}</span></div>
    <div>Trace types: <span class="val">${useMulti?data.multi_trace.n_trace_types:data.single_trace.n_trace_types}</span></div>
  `;
  if(gen<getHistory().length-1)requestAnimationFrame(animate);
}
document.getElementById('play').onclick=function(){running=!running;this.textContent=running?'Pause':'Play';if(running)animate();};
document.getElementById('reset').onclick=function(){gen=0;running=true;document.getElementById('play').textContent='Pause';animate();};
document.getElementById('toggle').onclick=function(){useMulti=!useMulti;this.textContent=useMulti?'Single-trace':'Multi-trace';gen=0;animate();};
document.getElementById('speed').oninput=function(){speed=+this.value;};
init();
</script>
</body>
</html>
